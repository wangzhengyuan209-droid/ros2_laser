#AMCL（自适应蒙特卡洛定位）通过粒子滤波估计机器人在已知地图中的位姿
amcl:
  ros__parameters:
    #初始化与恢复参数
    set_initial_pose: true
    initial_pose:
      x: 3.4
      y: 0.74
      z: 0.0
      yaw: -0.5
    #基础参数配置
    use_sim_time: false
    global_frame_id: "map"
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    scan_topic: "/scan"
    tf_broadcast: true
    transform_tolerance: 1.0
    #粒子滤波器参数
    max_particles: 2000
    min_particles: 800
    resample_interval: 2
    pf_err: 0.015
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    update_min_a: 0.2
    update_min_d: 0.2
    #激光雷达观测模型参数
    laser_model_type: "likelihood_field"
    laser_max_range: 12.0
    laser_min_range: 0.1
    max_beams: 60
    laser_likelihood_max_dist: 0.5
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    lambda_short: 0.1
    #运动模型参数
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.5
    alpha2: 0.5
    alpha3: 0.5
    alpha4: 0.5
    alpha5: 0.1
    save_pose_rate: 0.5
    do_beamskip: false
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    beam_skip_distance: 0.5 
#bt_navigator 负责根据预设的“剧本”（即行为树 XML）协调规划、控制和恢复等动作，完成导航任务。
