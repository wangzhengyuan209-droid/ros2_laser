slam_toolbox:
  ros__parameters:
    # 基础配置（匹配你的机器人和地图）
    use_sim_time: false
    resolution: 0.02          # 地图分辨率（和你现有map.yaml的0.02一致）
    max_laser_range: 8.0      # 激光最大范围（匹配你costmap的raytrace_range:8.0）
    minimum_travel_distance: 0.2  # 移动0.2m才更新地图（匹配你Karto的配置）
    minimum_travel_heading: 0.1   # 旋转0.1rad才更新地图（匹配你Karto的配置）
    map_update_interval: 1.0      # 地图更新频率（1Hz）

    # 闭环检测（核心，解决建图漂移）
    do_loop_closing: true         # 开启闭环检测
    loop_search_maximum_distance: 3.0  # 闭环检测最大距离
    loop_match_minimum_response_fine: 0.45  # 闭环匹配阈值（越高越严格）

    # 扫描匹配（适配差速底盘）
    scan_match_type: CeresScanMatcher  # 高精度扫描匹配
    use_scan_matching: true
    use_scan_barycenter: true
    scan_buffer_size: 10              # 缓存激光帧数量
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # 避障/代价配置（匹配你costmap的footprint）
    footprint: [[0.1, 0.12], [0.1, -0.12], [-0.15, -0.12], [-0.15, 0.12]]
    footprint_padding: 0.01           # footprint扩展量（和你costmap一致）
    occdist_scale: 0.01               # 障碍物代价权重

    # 求解器配置（平衡精度和算力）
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT

    # 调试配置（可选，发布更多话题用于调试）
    debug_logging: false
    publish_debug_info: false
    publish_localization_debug: false

    # 其他（默认即可）
    transform_publish_period: 0.05
    tf_buffer_duration: 30.0
    throttle_scans: 1
    transform_timeout: 0.2
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # 保留你原有所有配置，新增/修改以下项
    base_frame: base_link          # 机器人基坐标系（和你工程一致）
    odom_frame: odom               # 里程计坐标系（和你工程一致）
    map_frame: map                 # 地图坐标系
    # 确保TF发布相关配置
    transform_publish_period: 0.05 # 每50ms发布一次TF
    tf_buffer_duration: 30.0       # TF缓存时长
    transform_timeout: 0.2         # TF超时时间